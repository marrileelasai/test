variables:
  # Enable Gradle JFrog build
  Application_BuildType: 'gradleV2'

  # Gradle build configuration
  Build_Gradle_Tasks: 'build'
  Build_Gradle_Configuration: 'release'
  Build_Gradle_UseWrapper: 'false'
  Build_Gradle_UsesPlugin: 'false'

  # Repository configuration (using defaults)
  Build_Gradle_SourceRepo: 'everest-libs-release'

  # Maven descriptor deployment
  Build_Gradle_DeployMavenDesc: 'true'
  Build_Gradle_DeployIvyDesc: 'false'

  # Java configuration
  Build_Gradle_JavaHomeSelection: 'JDKVersion'
  Build_Gradle_JdkVersion: '21'
  Build_Gradle_JdkArchitecture: 'x64'

  # Docker Build
  ApplicationName: 'ot-orchestrator'
  Build_Docker: 'true'
  registryType: 'ACR-JFrogBuild'

  #AKS Deploy
  Deploy_Aks_Enabled: 'true'
  Deploy_Aks_ChartName: 'k8s-deployment-chart'
  #Deploy_Aks_ChartVersion: 'latest'
  Deploy_Aks_ChartVersion: '0.0.0'
#############################################################################################################################################################
###                                                                  Global Configurables                                                                 ###
